# SmartTable Redis 配置
# 适用于容器内部运行的 Redis 服务

# 绑定地址（容器内所有接口）
bind 127.0.0.1

# 端口
port 6379

# 以守护进程方式运行（由 Supervisor 管理，设为 no）
daemonize no

# PID 文件
pidfile /var/run/redis_6379.pid

# 日志级别
loglevel notice

# 日志文件
logfile ""

# 数据库数量
databases 16

# 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB 文件名称
dbfilename dump.rdb

# RDB 文件目录
dir /data/redis

# 最大连接数
maxclients 1000

# 禁用保护模式（仅在容器内部监听）
protected-mode no

# AOF 持久化（可选，默认关闭）
appendonly no

# 性能优化
# 设置最大内存策略（当内存达到限制时的行为）
# allkeys-lru: 移除最近最少使用的键
maxmemory 512mb
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# ========== 崩溃安全配置 ==========
# 使用增量 fsync 写 RDB 文件，降低崩溃时文件损坏风险
rdb-save-incremental-fsync yes