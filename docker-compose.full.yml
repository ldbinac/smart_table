# SmartTable 完整生产环境部署配置
# 包含 PostgreSQL 数据库、Redis 缓存、MinIO 对象存储
# 适用于生产环境的高可用部署

version: '3.8'

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:16-alpine
    container_name: smarttable-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-smarttable}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smarttable123}
      POSTGRES_DB: ${DB_NAME:-smarttable}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - smarttable-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smarttable} -d ${DB_NAME:-smarttable}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: smarttable-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - smarttable-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # MinIO 对象存储服务（可选）
  minio:
    image: minio/minio:latest
    container_name: smarttable-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - smarttable-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # SmartTable 统一应用（包含前后端）
  smarttable:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarttable
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      # Flask 配置
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-in-production}
      JWT_ACCESS_TOKEN_EXPIRES: ${JWT_ACCESS_TOKEN_EXPIRES:-86400}
      
      # 数据库配置（使用 PostgreSQL）
      DATABASE_URL: postgresql://${DB_USER:-smarttable}:${DB_PASSWORD:-smarttable123}@postgres:5432/${DB_NAME:-smarttable}
      
      # Redis 配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      
      # MinIO 配置
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET_NAME: smarttable
      MINIO_SECURE: "false"
      
      # 上传配置
      UPLOAD_FOLDER: /app/uploads
      MAX_CONTENT_LENGTH: 52428800  # 50MB
      
      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # 持久化上传文件
      - uploads_data:/app/uploads
      # 日志文件
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - smarttable-network
    deploy:
      resources:
        limits:
          memory: 2G

# 数据卷定义
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local

# 网络定义
networks:
  smarttable-network:
    driver: bridge
